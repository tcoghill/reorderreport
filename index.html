<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB1 Online</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="box">
    <h1>CB1 Online</h1>
    <p>Upload stock and usage data. Then search for an SKU to load the Crystal Ball view.</p>

    <div class="top-row">
      <div class="panel compact-panel">
        <h2>Stage 1: Upload File</h2>
        <input type="file" id="fileInput" accept=".csv">
        <div class="button-stack compact-stack">
          <button type="button" class="secondary-btn" onclick="downloadSimpleTemplate()">Simple Template</button>
          <button type="button" class="secondary-btn" onclick="downloadAdvancedTemplate()">Advanced Template</button>
          <button type="button" onclick="handleUpload()">Upload File</button>
          <button type="button" class="danger-btn" onclick="resetTool()">Reset</button>
        </div>
        <div id="uploadStatus" class="muted"></div>
      </div>

      <div class="panel">
        <h2>Stage 2: Search SKU</h2>
        <input type="text" id="skuSearch" placeholder="Search SKU..." oninput="handleSearch()" disabled>
        <div id="resultsPanel" class="muted">Upload a file to begin.</div>
      </div>
    </div>

    <div class="panel cb1-panel">
      <h2>CB1 View</h2>
      <div id="cb1Panel" class="muted">Select an SKU to load the CB1 view.</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
