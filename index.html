<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReorderReport</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }
    input, button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>ReorderReport</h1>
    <p>Upload your stock file. Get a reorder plan in seconds.</p>

    <input type="file" id="fileInput" accept=".csv">
    <button onclick="downloadTemplate()" style="background:#334155;color:white;">Download Template CSV</button>
    <button onclick="handleUpload()">Generate Report</button>

    <p id="status"></p>
  </div>

  <script>
    <script>
function downloadTemplate() {
  const csvContent = `SKU,Stock,MonthlyDemand,LeadTime
A,100,300,10
B,50,200,15`;

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "reorderreport-template.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function handleUpload() {
   function handleUpload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    document.getElementById("status").innerText = "Please upload a CSV file.";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    const rows = text.split("\n").map(r => r.split(","));

    const headers = rows[0];
    const data = rows.slice(1);

    let output = "<h3>Results</h3><table border='1' style='width:100%; color:white'><tr>";

    headers.forEach(h => output += `<th>${h}</th>`);
    output += "<th>Days Cover</th><th>Reorder Qty</th></tr>";

    data.forEach(row => {
      if (row.length < 4) return;

      const stock = parseFloat(row[1]);
      const monthly = parseFloat(row[2]);
      const lead = parseFloat(row[3]);

      if (isNaN(stock) || isNaN(monthly) || isNaN(lead)) return;

      const daily = monthly / 30;
      const daysCover = stock / daily;
      const reorderPoint = daily * lead;
      const reorderQty = Math.max(0, reorderPoint - stock);

      output += "<tr>";
      row.forEach(cell => output += `<td>${cell}</td>`);
      output += `<td>${daysCover.toFixed(1)}</td><td>${Math.ceil(reorderQty)}</td></tr>`;
    });

    output += "</table>";

    document.getElementById("status").innerHTML = output;
  };

  reader.readAsText(file);
  </script>

</body>
</html>
