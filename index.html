<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB1 Online</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="box">
    <h1>CB1 Online</h1>
    <p>Upload stock and usage data. Then review the Gold Overview and click an SKU to load the Crystal Ball view.</p>

    <div class="top-row">
            <div class="panel compact-panel">
        <h2>File Upload</h2>

        <input
          type="file"
          id="fileInput"
          accept=".csv"
          style="display:none;"
          onchange="handleUpload()"
        >

        <div class="action-row">
          <button type="button" onclick="triggerFileUpload()">Upload File</button>
          <button type="button" class="danger-btn" onclick="resetTool()">Reset</button>
        </div>

        <div class="subheading">Templates</div>

        <div class="button-stack compact-stack">
          <button type="button" class="secondary-btn" onclick="downloadSimpleTemplate()">Simple Template</button>
          <button type="button" class="secondary-btn" onclick="downloadAdvancedTemplate()">Advanced Template</button>
        </div>
      </div>

      <div class="panel">
        <h2>File Summary</h2>
        <div id="fileSummaryPanel" class="muted">Upload a file to see summary metadata.</div>
      </div>
    </div>

    <div class="panel cb1-panel">
      <h2>Gold Overview</h2>
      <div id="goldOverviewPanel" class="muted">Upload a file to generate the overview.</div>
    </div>

    <div class="panel cb1-panel">
      <h2>CB1 View</h2>
      <div id="cb1Panel" class="muted">Select an SKU to load the CB1 view.</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
